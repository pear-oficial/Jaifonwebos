<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jaifon WebOS</title>
    <style>
        :root {
            --pear-blur: blur(15px);
            --pear-white: rgba(255, 255, 255, 0.2);
            --pear-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: linear-gradient(135deg, #1e1e2f 0%, #4e54c8 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            color: white;
        }

        /* Barra de Estado Superior */
        #status-bar {
            height: 30px;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 500;
            background: rgba(0,0,0,0.1);
        }

        /* Escritorio */
        #desktop {
            flex: 1;
            position: relative;
            padding: 20px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 20px;
        }

        .icon {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .icon:active { transform: scale(0.9); }

        .icon-img {
            width: 55px;
            height: 55px;
            background: var(--pear-white);
            backdrop-filter: var(--pear-blur);
            border: 1px solid var(--pear-border);
            border-radius: 12px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .icon span { font-size: 11px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }

        /* Ventanas */
        .window {
            position: absolute;
            top: 10%; left: 5%; width: 90%; height: 70%;
            background: rgba(25, 25, 25, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid var(--pear-border);
            border-radius: 20px;
            display: none;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .window-header {
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255,255,255,0.05);
        }

        .close-btn {
            width: 25px; height: 25px;
            border-radius: 50%;
            background: #ff5f56;
            border: none; cursor: pointer;
        }

        .window-content { padding: 20px; flex: 1; overflow-y: auto; }

        /* Dock Inferior */
        #dock {
            height: 80px;
            background: var(--pear-white);
            backdrop-filter: var(--pear-blur);
            border-top: 1px solid var(--pear-border);
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            margin: 10px;
            border-radius: 25px;
            margin-bottom: 20px;
        }

        .dock-item {
            width: 50px; height: 50px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="status-bar">
        <span id="operator">Pear Network</span>
        <span id="clock">00:00</span>
    </div>

    <div id="desktop">
        <div class="icon" onclick="openWindow('files')">
            <div class="icon-img">📁</div>
            <span>Archivos</span>
        </div>
        <div class="icon" onclick="openWindow('settings')">
            <div class="icon-img">⚙️</div>
            <span>Ajustes</span>
        </div>
    </div>

    <div id="files" class="window">
        <div class="window-header">
            <span>Explorador</span>
            <button class="close-btn" onclick="closeWindow('files')"></button>
        </div>
        <div class="window-content">
            <p>Sistema de archivos Jaifon WebOS v1.0</p>
        </div>
    </div>

    <div id="settings" class="window">
        <div class="window-header">
            <span>Configuración</span>
            <button class="close-btn" onclick="closeWindow('settings')"></button>
        </div>
        <div class="window-content">
            <p>Modo Desarrollador: ON</p>
            <p>Ubicación actual: New York (VPN)</p>
        </div>
    </div>

    <div id="dock">
        <div class="dock-item">📞</div>
        <div class="dock-item">🌐</div>
        <div class="dock-item">✉️</div>
        <div class="dock-item">🎵</div>
    </div>

    <script>
        // Reloj Real
        function updateClock() {
            const now = new Date();
            const time = now.getHours().toString().padStart(2, '0') + ':' + 
                         now.getMinutes().toString().padStart(2, '0');
            document.getElementById('clock').innerText = time;
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Lógica de Ventanas
        function openWindow(id) {
            document.getElementById(id).style.display = 'flex';
        }

        function closeWindow(id) {
            document.getElementById(id).style.display = 'none';
        }
    </script>
</body>
</html>
